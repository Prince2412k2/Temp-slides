kind = "slides"
previewPath = "/pm-cert/"
title = "Google Project Management Certificate"
version = "1.0.0"
id = "artifacts/pm-cert"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pm-cert/" ]
localPort = 20597

[services.development]
run = "pnpm --filter @workspace/pm-cert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pm-cert", "run", "build" ]
publicDir = "artifacts/pm-cert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20597"
BASE_PATH = "/pm-cert/"
